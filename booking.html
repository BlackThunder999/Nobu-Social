<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование | Sibiria Airlines</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0b0f18;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back-link {
            color: #7eb8ff;
            text-decoration: none;
            font-size: 15px;
        }
        h2 {
            text-align: center;
            margin: 20px 0;
        }
        .card {
            background: #131a2b;
            border: 1px solid #1e2d45;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: #0d1117;
            color: #fff;
            border: 1px solid #1e2d45;
            font-size: 16px;
            cursor: pointer;
        }
        button {
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            background: #0066cc;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:disabled {
            background: #1e2d45;
            cursor: not-allowed;
        }
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            max-width: 360px;
            margin: 20px auto;
        }
        .seat {
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            background: #1a3a5c;
            transition: transform 0.1s;
        }
        .seat:hover:not(.booked):not(.selected) {
            transform: scale(1.1);
            background: #245a8c;
        }
        .seat.booked {
            background: #5c1a1a;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .seat.selected {
            background: #1a8c3a;
            box-shadow: 0 0 10px rgba(0,255,100,0.5);
        }
        .seat-info {
            text-align: center;
            margin: 10px 0;
            font-size: 15px;
        }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            text-align: center;
            font-weight: 600;
        }
        .message.success { background: #0f3a1e; }
        .message.error { background: #3a1a1a; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← На главную</a>
        <h2>🛫 Бронирование рейса</h2>

        <div class="card">
            <p style="margin:0 0 10px;font-weight:600;">Выберите рейс:</p>
            <select id="flightSelect" onchange="onFlightSelect(this.value)">
                <option value="">-- Загрузка рейсов... --</option>
            </select>
        </div>

        <div class="card" id="flightCard" style="display:none;">
            <h3 id="flightTitle" style="margin:0 0 5px;"></h3>
            <p id="flightInfo" style="margin:0 0 5px;color:#aab;"></p>
            <p id="freeSeats" style="margin:0;font-weight:600;"></p>

            <p style="margin:20px 0 5px;font-weight:600;">Схема салона (242 места):</p>
            <div class="seat-grid" id="seatMap"></div>
            <p class="seat-info" id="selectedSeatText">Место не выбрано</p>
            <button id="bookButton" disabled onclick="bookSeat()">Забронировать место</button>
            <div id="messageBox" class="message" style="display:none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );

        let currentFlightId = null;
        let selectedSeat = null;

        (async function loadFlights() {
            const { data } = await supabase.from('flights').select('*').eq('status', 'scheduled');
            const select = document.getElementById('flightSelect');
            if (!data || data.length === 0) {
                select.innerHTML = '<option>Нет доступных рейсов</option>';
                return;
            }
            select.innerHTML = '<option value="">-- Выберите рейс --</option>';
            data.forEach(f => {
                select.innerHTML += `<option value="${f.id}">${f.flight_number} — ${f.departure} → ${f.arrival}</option>`;
            });
        })();

        window.onFlightSelect = async function(flightId) {
            if (!flightId) {
                document.getElementById('flightCard').style.display = 'none';
                return;
            }
            currentFlightId = flightId;
            selectedSeat = null;
            document.getElementById('bookButton').disabled = true;
            document.getElementById('selectedSeatText').textContent = 'Место не выбрано';
            document.getElementById('messageBox').style.display = 'none';

            const { data: flight } = await supabase.from('flights').select('*').eq('id', flightId).single();
            if (!flight) return;

            document.getElementById('flightCard').style.display = 'block';
            document.getElementById('flightTitle').textContent = 'Рейс ' + flight.flight_number;
            document.getElementById('flightInfo').textContent = `${flight.departure} → ${flight.arrival} | Вылет: ${new Date(flight.departure_time).toLocaleString()}`;

            const { data: bookings } = await supabase.from('bookings').select('seat_number').eq('flight_id', flightId);
            const booked = new Set(bookings ? bookings.map(b => b.seat_number) : []);
            document.getElementById('freeSeats').textContent = `Свободно мест: ${242 - booked.size} из 242`;

            const map = document.getElementById('seatMap');
            map.innerHTML = '';
            for (let row = 1; row <= 41; row++) {
                for (let col of ['A','B','C','D','E','F']) {
                    if (row === 41 && col > 'B') break;
                    const seatNum = row + col;
                    const el = document.createElement('div');
                    el.className = 'seat';
                    el.textContent = seatNum;
                    if (booked.has(seatNum)) {
                        el.classList.add('booked');
                    } else {
                        el.addEventListener('click', () => selectSeat(seatNum, el));
                    }
                    map.appendChild(el);
                }
            }
        };

        function selectSeat(seatNum, element) {
            document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            selectedSeat = seatNum;
            document.getElementById('selectedSeatText').textContent = 'Выбрано место: ' + seatNum;
            document.getElementById('bookButton').disabled = false;
        }

        window.bookSeat = async function() {
            if (!currentFlightId || !selectedSeat) return;
            const passengerName = prompt('Ваш ник в Roblox (пилот):') || 'Пилот';
            const { error } = await supabase.from('bookings').insert({
                flight_id: currentFlightId,
                seat_number: selectedSeat,
                passenger_name: passengerName
            });
            const msgBox = document.getElementById('messageBox');
            msgBox.style.display = 'block';
            if (error) {
                msgBox.className = 'message error';
                msgBox.textContent = '❌ Ошибка: ' + error.message;
            } else {
                msgBox.className = 'message success';
                msgBox.textContent = '✅ Место ' + selectedSeat + ' забронировано!';
                document.getElementById('bookButton').disabled = true;
                onFlightSelect(currentFlightId);
            }
        };
    </script>
</body>
</html>
