<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование | Sibiria Airlines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back { color: #7eb8ff; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        h2 { text-align: center; margin-bottom: 25px; }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        select, button {
            padding: 14px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
        }
        select { width: 100%; background: #0d1117; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        button {
            background: #0066cc;
            color: #fff;
            border: none;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
        }
        button:disabled { background: #333; cursor: not-allowed; }
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            max-width: 360px;
            margin: 20px auto;
        }
        .seat {
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: 700;
            cursor: pointer;
            background: #1e3a5f;
            transition: 0.1s;
        }
        .seat:hover:not(.booked):not(.selected) { background: #2a5a8f; transform: scale(1.1); }
        .seat.booked { background: #5c1a1a; cursor: not-allowed; opacity: 0.6; }
        .seat.selected { background: #0d8a3e !important; box-shadow: 0 0 10px rgba(0,255,100,0.5); }
        .msg { padding: 12px; border-radius: 10px; margin-top: 12px; text-align: center; font-weight: 600; }
        .msg.ok { background: #0f3a1e; }
        .msg.err { background: #3a1a1a; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← На главную</a>
        <h2>🛫 Бронирование рейса</h2>
        <div class="card">
            <p style="margin-bottom:10px;font-weight:600;">Выберите рейс:</p>
            <select id="flightSelect" onchange="showFlight()">
                <option value="">-- Загрузка... --</option>
            </select>
        </div>
        <div class="card" id="flightCard" style="display:none;">
            <h3 id="fTitle"></h3>
            <p id="fInfo" style="color:#aab;"></p>
            <p id="fSeats" style="font-weight:600;"></p>
            <p style="margin-top:15px;font-weight:600;">Схема салона (242 места):</p>
            <div class="seat-grid" id="seatMap"></div>
            <p id="selText" style="text-align:center;">Место не выбрано</p>
            <button id="bookBtn" disabled onclick="book()">Забронировать</button>
            <div id="msgBox" class="msg" style="display:none;"></div>
        </div>
    </div>
    <script>
        const URL = 'https://jsonkeeper.com/b/VNI3L';
        let data, selectedSeat, currentFlight;
        
        fetch(URL).then(r => r.json()).then(d => {
            data = d;
            const sel = document.getElementById('flightSelect');
            sel.innerHTML = '<option value="">-- Выберите рейс --</option>';
            d.flights.forEach((f, i) => {
                sel.innerHTML += `<option value="${i}">${f.flight_number} — ${f.departure} → ${f.arrival}</option>`;
            });
        });

        function showFlight() {
            const idx = document.getElementById('flightSelect').value;
            if (!idx && idx !== 0) { document.getElementById('flightCard').style.display = 'none'; return; }
            currentFlight = data.flights[idx];
            selectedSeat = null;
            document.getElementById('flightCard').style.display = 'block';
            document.getElementById('fTitle').textContent = 'Рейс ' + currentFlight.flight_number;
            document.getElementById('fInfo').textContent = currentFlight.departure + ' → ' + currentFlight.arrival;
            const booked = currentFlight.booked_seats || [];
            document.getElementById('fSeats').textContent = 'Свободно: ' + (242 - booked.length) + ' из 242';
            document.getElementById('selText').textContent = 'Место не выбрано';
            document.getElementById('bookBtn').disabled = true;
            document.getElementById('msgBox').style.display = 'none';
            
            const map = document.getElementById('seatMap');
            map.innerHTML = '';
            for (let row = 1; row <= 41; row++) {
                for (let col of ['A','B','C','D','E','F']) {
                    if (row === 41 && col > 'B') break;
                    const sn = row + col;
                    const el = document.createElement('div');
                    el.className = 'seat';
                    el.textContent = sn;
                    if (booked.includes(sn)) { el.classList.add('booked'); }
                    else { el.onclick = () => { document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected')); el.classList.add('selected'); selectedSeat = sn; document.getElementById('selText').textContent = 'Выбрано: ' + sn; document.getElementById('bookBtn').disabled = false; }; }
                    map.appendChild(el);
                }
            }
        }

        function book() {
            if (!selectedSeat) return;
            const name = prompt('Ваш ник в Roblox:') || 'Пилот';
            currentFlight.booked_seats.push(selectedSeat);
            const msg = document.getElementById('msgBox');
            msg.style.display = 'block';
            msg.className = 'msg ok';
            msg.textContent = '✅ Место ' + selectedSeat + ' забронировано для ' + name + '! (демо)';
            document.getElementById('bookBtn').disabled = true;
            showFlight();
        }
    </script>
</body>
</html>
