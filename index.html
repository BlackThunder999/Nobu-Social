<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibiria Airlines Virtual</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0b0f18;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            padding: 30px;
            text-align: center;
        }
        .logo {
            font-size: 70px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0 0 30px 0;
            letter-spacing: 3px;
            background: linear-gradient(to bottom, #fff, #7eb8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .stat-box {
            background: #131a2b;
            border: 1px solid #1e2d45;
            border-radius: 16px;
            padding: 24px 20px;
            width: 160px;
        }
        .stat-box .label {
            font-size: 12px;
            letter-spacing: 1px;
            color: #7a8ba8;
            margin-bottom: 6px;
        }
        .stat-box .value {
            font-size: 36px;
            font-weight: 700;
        }
        .value.blue { color: #4dabf7; }
        .value.red { color: #ff6b6b; }
        .value.green { color: #51cf66; }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 16px 28px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .btn-primary { background: #0066cc; }
        .btn-outline { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✈️</div>
        <h1>SIBIRIA AIRLINES VIRTUAL</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="label">ВСЕГО РЕЙСОВ</div>
                <div class="value blue" id="totalFlights">---</div>
            </div>
            <div class="stat-box">
                <div class="label">КАТАСТРОФ</div>
                <div class="value red" id="crashes">---</div>
            </div>
            <div class="stat-box">
                <div class="label">ПОСАДОК</div>
                <div class="value green" id="landings">---</div>
            </div>
        </div>

        <div class="buttons">
            <a href="booking.html" class="btn btn-primary">🛫 Бронирование</a>
            <a href="dispatch.html" class="btn btn-outline">📡 Диспетчерская</a>
            <a href="admin.html" class="btn btn-outline">⚙️ Админ-панель</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );
        (async () => {
            const { count } = await supabase.from('flights').select('*', { count: 'exact', head: true });
            const { data } = await supabase.from('stats').select('*').eq('id', 1).single();
            document.getElementById('totalFlights').textContent = count || 0;
            document.getElementById('crashes').textContent = data?.crashes || 0;
            document.getElementById('landings').textContent = data?.successful_landings || 0;
        })();
    </script>
</body>
</html>
