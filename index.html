<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibiria Airlines Virtual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 700px; width: 100%; text-align: center; }
        .logo { font-size: 80px; margin-bottom: 10px; }
        h1 {
            font-size: 2.5em;
            background: linear-gradient(to bottom, #fff, #7eb8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }
        .stats { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 25px 20px;
            min-width: 150px;
        }
        .stat-label { font-size: 0.85em; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 2.5em; font-weight: 700; }
        .stat-value.blue { color: #4dabf7; }
        .stat-value.red { color: #ff6b6b; }
        .stat-value.green { color: #51cf66; }
        .nav { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 16px 30px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 1.05em;
            transition: 0.2s;
            display: inline-block;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .btn-book { background: #0066cc; }
        .btn-disp { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); }
        .btn-admin { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✈️</div>
        <h1>SIBIRIA AIRLINES VIRTUAL</h1>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Всего рейсов</div>
                <div class="stat-value blue" id="tFlights">...</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Катастроф</div>
                <div class="stat-value red" id="tCrashes">...</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Удачных посадок</div>
                <div class="stat-value green" id="tLandings">...</div>
            </div>
        </div>
        <div class="nav">
            <a href="booking.html" class="btn btn-book">🛫 Бронирование</a>
            <a href="dispatch.html" class="btn btn-disp">📡 Диспетчерская</a>
            <a href="admin.html" class="btn btn-admin">⚙️ Админ-панель</a>
        </div>
    </div>
    <script>
        const URL = 'https://jsonkeeper.com/b/VNI3L';
        fetch(URL).then(r => r.json()).then(d => {
            document.getElementById('tFlights').textContent = d.stats.total_flights;
            document.getElementById('tCrashes').textContent = d.stats.crashes;
            document.getElementById('tLandings').textContent = d.stats.successful_landings;
        }).catch(() => {
            document.getElementById('tFlights').textContent = '5';
            document.getElementById('tCrashes').textContent = '4';
            document.getElementById('tLandings').textContent = '3';
        });
    </script>
</body>
</html>
