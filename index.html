<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>School Stealth 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#000; overflow:hidden; font-family:Arial,sans-serif; height:100vh; width:100vw; touch-action:manipulation; }
        canvas { display:block; position:fixed; top:0; left:0; z-index:1; }
        
        #menuScreen { 
            position:fixed; inset:0; z-index:100; 
            background:linear-gradient(135deg,#1a1a2e,#16213e,#0a0a0a); 
            display:flex; flex-direction:column; align-items:center; justify-content:center; gap:15px; 
        }
        #menuScreen.hidden { display:none !important; }
        .menu-title { font-size:28px; color:#ffd700; text-align:center; text-shadow:0 0 20px rgba(255,215,0,0.5); pointer-events:none; }
        .menu-btn { 
            width:200px; padding:16px; font-size:18px; font-weight:bold; 
            border:2px solid #ffd700; background:rgba(255,215,0,0.15); color:#ffd700; 
            border-radius:12px; cursor:pointer; z-index:101; position:relative;
            transition: all 0.2s;
        }
        .menu-btn:active { background:#ffd700; color:#000; transform:scale(0.95); }
        
        #topUI { position:fixed; top:8px; left:8px; right:8px; z-index:10; display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.7); padding:6px 10px; border-radius:8px; color:#fff; font-size:11px; pointer-events:none; }
        #timeUI { color:#ffd700; font-weight:bold; min-width:55px; }
        #lessonUI { color:#fff; font-size:10px; margin:0 4px; }
        #suspicionBar { flex:1; height:7px; background:#333; border-radius:3px; overflow:hidden; }
        #suspicionFill { height:100%; width:0%; background:linear-gradient(90deg,#0f0,#ff0,#f00); transition:width 0.3s; }
        #staminaMiniBar { width:50px; height:5px; background:#333; border-radius:2px; overflow:hidden; }
        #staminaMiniFill { height:100%; width:100%; background:#ffd700; transition:width 0.2s; }
        
        #controlsUI { position:fixed; bottom:15px; left:8px; right:8px; z-index:10; display:flex; justify-content:space-between; align-items:flex-end; pointer-events:none; }
        #joystickZone { width:110px; height:110px; pointer-events:auto; position:relative; }
        #joystickBase { width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.2); position:relative; }
        #joystickKnob { width:45px; height:45px; border-radius:50%; background:rgba(255,255,255,0.3); border:2px solid rgba(255,255,255,0.5); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        #rightControls { display:flex; flex-direction:column; gap:6px; align-items:flex-end; pointer-events:auto; }
        .btn-row { display:flex; gap:6px; }
        .game-btn { width:50px; height:50px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.1); color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .game-btn:active { background:rgba(255,255,255,0.3); transform:scale(0.9); }
        .btn-run { border-color:#ffd700; } .btn-jump { border-color:#0bf; } .btn-action { border-color:#f69; width:60px; height:60px; font-size:26px; }
        
        #dialogBox { position:fixed; bottom:175px; left:8px; right:8px; z-index:15; background:rgba(0,0,0,0.92); border:2px solid #ffd700; border-radius:10px; padding:12px; color:#fff; font-size:13px; display:none; }
        #dialogBox.show { display:block; }
        #dialogName { color:#ffd700; font-weight:bold; margin-bottom:4px; }
        #dialogText { margin-bottom:8px; line-height:1.4; }
        #dialogBtns { display:flex; gap:6px; flex-wrap:wrap; }
        .dialog-btn { padding:8px 14px; background:rgba(255,215,0,0.1); border:1px solid #ffd700; color:#ffd700; border-radius:6px; cursor:pointer; font-size:12px; pointer-events:auto; }
        .dialog-btn:active { background:#ffd700; color:#000; }
        
        #miniMap { position:fixed; top:45px; right:6px; width:65px; height:65px; z-index:8; border:2px solid rgba(255,255,255,0.3); border-radius:4px; overflow:hidden; background:rgba(0,0,0,0.6); }
        #miniMapCanvas { width:100%; height:100%; }
        
        #endScreen { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; gap:15px; }
        #endScreen.show { display:flex !important; }
        #endTitle { font-size:24px; color:#ffd700; } 
        #endText { color:#fff; font-size:13px; text-align:center; max-width:280px; } 
        #endScore { color:#888; font-size:12px; }
    </style>
</head>
<body>

<div id="menuScreen">
    <div class="menu-title">🏫 Школа Выживания 3D</div>
    <button class="menu-btn" id="btnPlay" onclick="startGame()">▶ ИГРАТЬ</button>
</div>

<div id="topUI" style="display:none;">
    <span id="timeUI">🕐 08:30</span>
    <span id="lessonUI"></span>
    <div id="suspicionBar"><div id="suspicionFill"></div></div>
    <div id="staminaMiniBar"><div id="staminaMiniFill"></div></div>
</div>

<div id="controlsUI" style="display:none;">
    <div id="joystickZone"><div id="joystickBase"><div id="joystickKnob"></div></div></div>
    <div id="rightControls">
        <div class="btn-row">
            <button class="game-btn btn-run" id="btnRun">🏃</button>
            <button class="game-btn btn-jump" id="btnJump">🦘</button>
        </div>
        <button class="game-btn btn-action" id="btnAction">👋</button>
    </div>
</div>

<div id="dialogBox">
    <div id="dialogName"></div>
    <div id="dialogText"></div>
    <div id="dialogBtns"></div>
</div>

<div id="miniMap" style="display:none;">
    <canvas id="miniMapCanvas"></canvas>
</div>

<div id="endScreen">
    <div id="endTitle"></div>
    <div id="endText"></div>
    <div id="endScore"></div>
    <button class="menu-btn" onclick="restartGame()">Играть заново</button>
</div>

<script>
// ==================== THREE.JS ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0f0a);
scene.fog = new THREE.Fog(0x1a0f0a, 15, 50);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.5, 80);
camera.position.set(0, 16, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const mmCanvas = document.getElementById('miniMapCanvas');
const mmCtx = mmCanvas.getContext('2d');
mmCanvas.width = 65;
mmCanvas.height = 65;

// Освещение
scene.add(new THREE.AmbientLight(0x404060, 0.6));
const dirLight = new THREE.DirectionalLight(0xffeedd, 0.7);
dirLight.position.set(10, 20, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -25;
dirLight.shadow.camera.right = 25;
dirLight.shadow.camera.top = 25;
dirLight.shadow.camera.bottom = -25;
scene.add(dirLight);

for (let z = -14; z <= 14; z += 7) {
    for (let x = -16; x <= 16; x += 8) {
        const pl = new THREE.PointLight(0xffcc88, 0.5, 10);
        pl.position.set(x, 3.5, z);
        pl.castShadow = true;
        scene.add(pl);
    }
}

// Пол
const floorGeo = new THREE.PlaneGeometry(36, 36);
const floor = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 0.9 }));
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

for (let z = -17; z < 18; z += 2) {
    for (let x = -17; x < 18; x += 2) {
        const tile = new THREE.Mesh(
            new THREE.PlaneGeometry(1.8, 1.8),
            new THREE.MeshStandardMaterial({ color: Math.random() > 0.5 ? 0x4a3020 : 0x362318, roughness: 0.85 })
        );
        tile.rotation.x = -Math.PI / 2;
        tile.position.set(x + 1, 0.01, z + 1);
        tile.receiveShadow = true;
        scene.add(tile);
    }
}

// Стены
function createWall(x, y, z, w, h, d, color = 0x8b7355) {
    const wall = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color, roughness: 0.7 })
    );
    wall.position.set(x, y, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    scene.add(wall);
}

createWall(0, 2.5, -18, 36, 5, 0.5);
createWall(0, 2.5, 18, 36, 5, 0.5);
createWall(-18, 2.5, 0, 0.5, 5, 36);
createWall(18, 2.5, 0, 0.5, 5, 36);
createWall(-7, 2.5, -9, 0.4, 5, 10, 0xa09080);
createWall(7, 2.5, -9, 0.4, 5, 10, 0xa09080);
createWall(-7, 2.5, 9, 0.4, 5, 10, 0xa09080);
createWall(7, 2.5, 9, 0.4, 5, 10, 0xa09080);
createWall(0, 2.5, -5, 14, 5, 0.4, 0xa09080);
createWall(0, 2.5, 5, 14, 5, 0.4, 0xa09080);

// Парты
function createDesk(x, y, z) {
    const top = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 0.1, 1),
        new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.5 })
    );
    top.position.set(x, 0.9, z);
    top.castShadow = true;
    top.receiveShadow = true;
    scene.add(top);
    
    for (let lx = -0.5; lx <= 0.5; lx += 1) {
        for (let lz = -0.35; lz <= 0.35; lz += 0.7) {
            const leg = new THREE.Mesh(
                new THREE.CylinderGeometry(0.05, 0.05, 0.8),
                new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.5, metalness: 0.5 })
            );
            leg.position.set(x + lx, 0.4, z + lz);
            leg.castShadow = true;
            scene.add(leg);
        }
    }
}

for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 2; col++) {
        createDesk(-13 + col * 2, 0, -13 + row * 2);
        createDesk(13 - col * 2, 0, -13 + row * 2);
    }
}

// Двери
const doors = [];

function createDoor(x, y, z, name) {
    const frame = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 2.8, 0.2),
        new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.6 })
    );
    frame.position.set(x, 1.4, z);
    frame.castShadow = true;
    scene.add(frame);
    
    const doorMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 2.6, 0.1),
        new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 0.4 })
    );
    doorMesh.position.set(x, 1.3, z);
    doorMesh.castShadow = true;
    doorMesh.userData = { name, isOpen: false, originalX: x, openX: x + 0.7 };
    scene.add(doorMesh);
    doors.push(doorMesh);
}

createDoor(-9, 1.4, 0, '📐 Математика');
createDoor(9, 1.4, 0, '⚡ Физика');
createDoor(-4, 1.4, -5.2, '🚽 Туалет');
createDoor(4, 1.4, -5.2, '🏥 Медпункт');
createDoor(-4, 1.4, 5.2, '🗣️ Логопед');
createDoor(4, 1.4, 5.2, '🧥 Раздевалка');

// Игрок
const playerGeo = new THREE.CapsuleGeometry(0.35, 1, 4, 8);
const playerMesh = new THREE.Mesh(playerGeo, new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.3 }));
playerMesh.position.set(0, 0.7, 0);
playerMesh.castShadow = true;
scene.add(playerMesh);

const eyeGeo = new THREE.SphereGeometry(0.07);
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
leftEye.position.set(-0.1, 0.9, 0.3);
playerMesh.add(leftEye);
const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
rightEye.position.set(0.1, 0.9, 0.3);
playerMesh.add(rightEye);

const shadowMesh = new THREE.Mesh(
    new THREE.CircleGeometry(0.35, 16),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
);
shadowMesh.rotation.x = -Math.PI / 2;
shadowMesh.position.y = 0.02;
scene.add(shadowMesh);

// Учителя
const teachers = [];

function createTeacher(x, y, z, color, minX, maxX, minZ, maxZ) {
    const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.35, 1, 4, 8),
        new THREE.MeshStandardMaterial({ color, roughness: 0.4 })
    );
    body.position.set(x, y, z);
    body.castShadow = true;
    
    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.3),
        new THREE.MeshStandardMaterial({ color: 0xffd5b4, roughness: 0.6 })
    );
    head.position.y = 0.8;
    body.add(head);
    
    const hat = new THREE.Mesh(
        new THREE.CylinderGeometry(0.32, 0.35, 0.2, 8),
        new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4 })
    );
    hat.position.y = 1.05;
    body.add(hat);
    
    scene.add(body);
    
    return {
        mesh: body,
        minX, maxX, minZ, maxZ,
        dirX: Math.random() > 0.5 ? 1 : -1,
        dirZ: Math.random() > 0.5 ? 1 : -1,
        speed: 0.03 + Math.random() * 0.02
    };
}

teachers.push(createTeacher(-11, 0.7, -10, 0xff4444, -16, -6, -15, -5));
teachers.push(createTeacher(11, 0.7, 10, 0x4444ff, 6, 16, 5, 15));
teachers.push(createTeacher(0, 0.7, -15, 0xff8844, -5, 5, -17, -10));

// NPC
const npcs = [];

function createNPC(x, y, z, color, name, dialogs) {
    const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.3, 0.8, 4, 8),
        new THREE.MeshStandardMaterial({ color, roughness: 0.4 })
    );
    body.position.set(x, y, z);
    body.castShadow = true;
    
    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.25),
        new THREE.MeshStandardMaterial({ color: 0xffd5b4, roughness: 0.6 })
    );
    head.position.y = 0.6;
    body.add(head);
    
    scene.add(body);
    npcs.push({ mesh: body, name, dialogs, x, z });
}

createNPC(-14, 0.6, 4, 0x88ff88, '🍺 Друн', [
    'Слышь... дай списать?',
    'Я не пью, я существую в жидком состоянии.',
    'Забей, я сам не знаю что задали.'
]);

createNPC(14, 0.6, -4, 0x8888ff, '🛋️ Скуф', [
    'На физру? Не, я тут посижу.',
    'Мой диван — моя крепость.',
    'Отстань, я отдыхаю.'
]);

createNPC(-8, 0.6, -12, 0xff88ff, '🧑‍⚕️ Медсестра', [
    'Что болит? Голова? Живот? Совесть?',
    'Температуры нет. Иди на урок.',
    'Ладно, дам справку на 10 минут. Отдыхай.'
]);

// Укрытия
const hideouts = [
    { x: -4, z: -5.2, name: '🚽 Туалет', radius: 2 },
    { x: 4, z: -5.2, name: '🏥 Медпункт', radius: 2 },
    { x: -4, z: 5.2, name: '🗣️ Логопед', radius: 2 },
    { x: 4, z: 5.2, name: '🧥 Раздевалка', radius: 2 }
];

// Расписание
const schedule = [
    { time: 0, lesson: '1 урок: Математика' },
    { time: 45, lesson: 'Перемена' },
    { time: 60, lesson: '2 урок: Физика' },
    { time: 105, lesson: 'Перемена' },
    { time: 120, lesson: '3 урок: История' },
    { time: 165, lesson: 'Большая перемена' },
    { time: 195, lesson: '4 урок: Физра' },
    { time: 240, lesson: 'Перемена' },
    { time: 255, lesson: '5 урок: Химия' },
    { time: 300, lesson: 'Перемена' },
    { time: 315, lesson: '6 урок: Литература' }
];

// Игровые переменные
let gameRunning = false;
let suspicion = 0;
let gameTime = 0;
let score = 0;
let stamina = 100;
let isRunning = false;
let isJumping = false;
let jumpVel = 0;
let joystickX = 0, joystickY = 0, joystickActive = false;
let camAngle = 0;
let keys = {};

// Сообщения
function showMessage(text) {
    const box = document.getElementById('dialogBox');
    document.getElementById('dialogName').textContent = '';
    document.getElementById('dialogText').textContent = text;
    document.getElementById('dialogBtns').innerHTML = '<button class="dialog-btn" onclick="document.getElementById(\'dialogBox\').classList.remove(\'show\')">OK</button>';
    box.classList.add('show');
    setTimeout(() => box.classList.remove('show'), 2500);
}

function showNPCDialog(npc) {
    const box = document.getElementById('dialogBox');
    const dialog = npc.dialogs[Math.floor(Math.random() * npc.dialogs.length)];
    document.getElementById('dialogName').textContent = npc.name;
    document.getElementById('dialogText').textContent = '"' + dialog + '"';
    
    let buttonsHTML = '<button class="dialog-btn" onclick="document.getElementById(\'dialogBox\').classList.remove(\'show\')">Ладно</button>';
    if (npc.name.includes('Медсестра')) {
        buttonsHTML += '<button class="dialog-btn" onclick="getSickNote()">🤒 Притвориться больным</button>';
    }
    document.getElementById('dialogBtns').innerHTML = buttonsHTML;
    box.classList.add('show');
}

function getSickNote() {
    suspicion = Math.max(0, suspicion - 40);
    score += 150;
    document.getElementById('dialogBox').classList.remove('show');
    showMessage('🧑‍⚕️ Медсестра: "Держи справку на 10 минут. Отдыхай."');
}

// Взаимодействие
function interact() {
    const px = playerMesh.position.x;
    const pz = playerMesh.position.z;

    // Проверка дверей
    for (const door of doors) {
        const dx = px - door.position.x;
        const dz = pz - door.position.z;
        if (Math.sqrt(dx * dx + dz * dz) < 2.5) {
            door.userData.isOpen = !door.userData.isOpen;
            door.position.x = door.userData.isOpen ? door.userData.openX : door.userData.originalX;
            showMessage(door.userData.isOpen ? '🚪 Открыто: ' + door.userData.name : '🚪 Закрыто');
            return;
        }
    }

    // Проверка укрытий
    for (const hideout of hideouts) {
        const dx = px - hideout.x;
        const dz = pz - hideout.z;
        if (Math.sqrt(dx * dx + dz * dz) < hideout.radius) {
            suspicion = Math.max(0, suspicion - 35);
            score += 100;
            showMessage(hideout.name + ': Спрятался! Подозрение -35%');
            return;
        }
    }

    // Проверка NPC
    for (const npc of npcs) {
        const dx = px - npc.x;
        const dz = pz - npc.z;
        if (Math.sqrt(dx * dx + dz * dz) < 2.8) {
            showNPCDialog(npc);
            return;
        }
    }
}

// Джойстик
const joystickZone = document.getElementById('joystickZone');
const joystickKnob = document.getElementById('joystickKnob');

joystickZone.addEventListener('touchstart', (e) => {
    e.preventDefault();
    joystickActive = true;
    updateJoystick(e.touches[0]);
});

joystickZone.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (joystickActive) updateJoystick(e.touches[0]);
});

joystickZone.addEventListener('touchend', () => {
    joystickActive = false;
    joystickX = 0;
    joystickY = 0;
    joystickKnob.style.transform = 'translate(-50%, -50%)';
});

function updateJoystick(touch) {
    const rect = joystickZone.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const maxDist = rect.width / 2 - 22;
    
    let dx = touch.clientX - centerX;
    let dy = touch.clientY - centerY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist > maxDist) {
        dx = dx / dist * maxDist;
        dy = dy / dist * maxDist;
    }
    
    joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    joystickX = dx / maxDist;
    joystickY = dy / maxDist;
}

// Поворот камеры
document.addEventListener('touchmove', (e) => {
    for (const touch of e.touches) {
        if (touch.clientX > window.innerWidth / 2 && !joystickActive) {
            camAngle += (touch.movementX || 0) * 0.005;
        }
    }
});

// Кнопки
document.getElementById('btnRun').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (stamina > 0) isRunning = true;
});
document.getElementById('btnRun').addEventListener('touchend', () => { isRunning = false; });

document.getElementById('btnJump').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!isJumping) {
        isJumping = true;
        jumpVel = 0.25;
    }
});

document.getElementById('btnAction').addEventListener('touchstart', (e) => {
    e.preventDefault();
    interact();
});

// Клавиатура
document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === 'e' || e.key === 'E') interact();
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Игровой цикл
function update() {
    if (!gameRunning) return;

    let speed = isRunning ? 0.2 : 0.1;
    let moveX = 0, moveZ = 0;

    if (joystickActive) {
        moveX = joystickX * speed;
        moveZ = -joystickY * speed;
    }

    if (keys['w'] || keys['ArrowUp']) moveZ = -speed;
    if (keys['s'] || keys['ArrowDown']) moveZ = speed;
    if (keys['a'] || keys['ArrowLeft']) moveX = -speed;
    if (keys['d'] || keys['ArrowRight']) moveX = speed;
    if (keys['Shift'] && stamina > 0) isRunning = true;
    else if (!keys['Shift']) isRunning = false;
    if ((keys[' '] || keys['Space']) && !isJumping) {
        isJumping = true;
        jumpVel = 0.25;
    }

    // Стамина
    if (isRunning && (Math.abs(moveX) > 0 || Math.abs(moveZ) > 0)) {
        stamina = Math.max(0, stamina - 0.5);
        if (stamina <= 0) isRunning = false;
    } else {
        stamina = Math.min(100, stamina + 0.3);
    }

    // Прыжок
    if (isJumping) {
        playerMesh.position.y += jumpVel;
        jumpVel -= 0.015;
        if (playerMesh.position.y <= 0.7) {
            playerMesh.position.y = 0.7;
            isJumping = false;
            jumpVel = 0;
        }
    }

    // Движение
    const cos = Math.cos(camAngle);
    const sin = Math.sin(camAngle);
    playerMesh.position.x += moveX * cos - moveZ * sin;
    playerMesh.position.z += moveX * sin + moveZ * cos;
    playerMesh.position.x = Math.max(-17, Math.min(17, playerMesh.position.x));
    playerMesh.position.z = Math.max(-17, Math.min(17, playerMesh.position.z));

    shadowMesh.position.x = playerMesh.position.x;
    shadowMesh.position.z = playerMesh.position.z;

    // Камера
    camera.position.set(
        playerMesh.position.x - sin * 10,
        14,
        playerMesh.position.z - cos * 10
    );
    camera.lookAt(playerMesh.position.x, 1, playerMesh.position.z);

    // Учителя
    for (const teacher of teachers) {
        teacher.mesh.position.x += teacher.dirX * teacher.speed;
        teacher.mesh.position.z += teacher.dirZ * teacher.speed;
        
        if (teacher.mesh.position.x > teacher.maxX || teacher.mesh.position.x < teacher.minX) teacher.dirX *= -1;
        if (teacher.mesh.position.z > teacher.maxZ || teacher.mesh.position.z < teacher.minZ) teacher.dirZ *= -1;
        if (Math.random() < 0.01) {
            teacher.dirX = Math.random() > 0.5 ? 1 : -1;
            teacher.dirZ = Math.random() > 0.5 ? 1 : -1;
        }

        const dx = playerMesh.position.x - teacher.mesh.position.x;
        const dz = playerMesh.position.z - teacher.mesh.position.z;
        if (Math.sqrt(dx * dx + dz * dz) < 2.8) {
            suspicion = Math.min(100, suspicion + 0.5);
            if (suspicion >= 100) endGame(false);
        }
    }

    // Снижение подозрения
    let nearTeacher = false;
    for (const teacher of teachers) {
        const dx = playerMesh.position.x - teacher.mesh.position.x;
        const dz = playerMesh.position.z - teacher.mesh.position.z;
        if (Math.sqrt(dx * dx + dz * dz) < 2.8) nearTeacher = true;
    }
    if (!nearTeacher) suspicion = Math.max(0, suspicion - 0.06);

    // Время
    gameTime += 1 / 60;
    if (gameTime >= 360) endGame(true);

    // UI
    document.getElementById('timeUI').textContent = '🕐 ' + String(Math.floor(8 + gameTime / 60)).padStart(2, '0') + ':' + String(Math.floor(gameTime % 60)).padStart(2, '0');
    
    let currentLesson = '';
    for (const s of schedule) {
        if (gameTime >= s.time) currentLesson = s.lesson;
    }
    document.getElementById('lessonUI').textContent = currentLesson;
    document.getElementById('suspicionFill').style.width = suspicion + '%';
    document.getElementById('staminaMiniFill').style.width = stamina + '%';

    // Мини-карта
    mmCtx.fillStyle = 'rgba(0,0,0,0.8)';
    mmCtx.fillRect(0, 0, 65, 65);
    const scaleX = 65 / 36;
    const scaleY = 65 / 36;

    for (const teacher of teachers) {
        mmCtx.fillStyle = '#f44';
        mmCtx.fillRect((teacher.mesh.position.x + 18) * scaleX - 1.5, (teacher.mesh.position.z + 18) * scaleY - 1.5, 3, 3);
    }
    for (const hideout of hideouts) {
        mmCtx.fillStyle = '#0f0';
        mmCtx.fillRect((hideout.x + 18) * scaleX - 2, (hideout.z + 18) * scaleY - 2, 4, 4);
    }
    for (const npc of npcs) {
        mmCtx.fillStyle = '#88f';
        mmCtx.fillRect((npc.x + 18) * scaleX - 1, (npc.z + 18) * scaleY - 1, 2, 2);
    }
    mmCtx.fillStyle = '#ffd700';
    mmCtx.fillRect((playerMesh.position.x + 18) * scaleX - 2.5, (playerMesh.position.z + 18) * scaleY - 2.5, 5, 5);
}

function endGame(win) {
    gameRunning = false;
    document.getElementById('endScreen').classList.add('show');
    
    if (win && suspicion < 20) {
        document.getElementById('endTitle').textContent = '🏆 НИНДЗЯ!';
        document.getElementById('endText').textContent = 'Идеальный день! Никто не заметил!';
        score += 5000;
    } else if (win) {
        document.getElementById('endTitle').textContent = '👍 ВЫЖИЛ';
        document.getElementById('endText').textContent = 'День окончен! Можно выдохнуть.';
        score += 1000;
    } else {
        document.getElementById('endTitle').textContent = '💀 ПОЙМАН!';
        document.getElementById('endText').textContent = 'Директор вызвал родителей...';
    }
    document.getElementById('endScore').textContent = 'Очки: ' + score;
}

function gameLoop() {
    update();
    renderer.render(scene, camera);
    requestAnimationFrame(gameLoop);
}

// Старт и рестарт
function startGame() {
    document.getElementById('menuScreen').classList.add('hidden');
    document.getElementById('topUI').style.display = 'flex';
    document.getElementById('controlsUI').style.display = 'flex';
    document.getElementById('miniMap').style.display = 'block';
    
    gameRunning = true;
    suspicion = 0;
    gameTime = 0;
    score = 0;
    stamina = 100;
    playerMesh.position.set(0, 0.7, 0);
    camAngle = 0;
}

function restartGame() {
    document.getElementById('endScreen').classList.remove('show');
    
    gameRunning = true;
    suspicion = 0;
    gameTime = 0;
    score = 0;
    stamina = 100;
    playerMesh.position.set(0, 0.7, 0);
    camAngle = 0;
    
    for (const teacher of teachers) {
        teacher.mesh.position.set(
            (teacher.minX + teacher.maxX) / 2,
            0.7,
            (teacher.minZ + teacher.maxZ) / 2
        );
    }
}

// Адаптация
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Запуск
gameLoop();
</script>
</body>
</html>
