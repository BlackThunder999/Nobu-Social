<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерская | Sibiria Airlines</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0b0f18;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back-link {
            color: #7eb8ff;
            text-decoration: none;
        }
        .card {
            background: #131a2b;
            border: 1px solid #1e2d45;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        h2 {
            margin: 0 0 15px 0;
        }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: #0d1117;
            border: 1px solid #1e2d45;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        button {
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            font-size: 15px;
        }
        .btn-login { background: #0066cc; width: 100%; }
        .btn-depart { background: #e67e00; }
        .btn-arrive { background: #0d8a3e; }
        .btn-delete { background: #b53030; }
        .flight-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #1e2d45;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chat-box {
            height: 280px;
            overflow-y: auto;
            background: #0d1117;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .chat-input-row {
            display: flex;
            gap: 10px;
        }
        .chat-input-row input {
            flex: 1;
            margin-bottom: 0;
        }
        .chat-input-row button {
            width: auto;
        }
        .msg {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .time {
            color: #556;
            font-size: 12px;
        }
        .error-text {
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← На главную</a>

        <div class="card" id="loginCard">
            <h2>🔐 Доступ в диспетчерскую</h2>
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button class="btn-login" onclick="login()">Войти</button>
            <p id="loginError" class="error-text"></p>
        </div>

        <div id="workArea" style="display:none;">
            <div class="card">
                <h2>📋 Управление рейсами</h2>
                <div id="flightsContainer">Загрузка...</div>
            </div>
            <div class="card">
                <h2>💬 Чат с пилотами</h2>
                <div class="chat-box" id="chatBox"></div>
                <div class="chat-input-row">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button class="btn-login" onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );

        window.login = function() {
            if (document.getElementById('passwordInput').value === 'Sibiria2026') {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('workArea').style.display = 'block';
                loadFlights();
                loadChat();
                supabase
                    .channel('live')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'flights' }, loadFlights)
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadChat)
                    .subscribe();
            } else {
                document.getElementById('loginError').textContent = 'Неверный пароль!';
            }
        };

        async function loadFlights() {
            const { data } = await supabase.from('flights').select('*').order('departure_time');
            const container = document.getElementById('flightsContainer');
            if (!data) { container.innerHTML = 'Ошибка загрузки'; return; }
            container.innerHTML = data.map(f => {
                let actionBtn = '';
                if (f.status === 'scheduled') actionBtn = `<button class="btn-depart" onclick="changeStatus(${f.id}, 'departed')">✈️ Взлетел</button>`;
                if (f.status === 'departed') actionBtn = `<button class="btn-arrive" onclick="changeStatus(${f.id}, 'arrived')">🛬 Сел</button>`;
                return `<div class="flight-row">
                    <span><b>${f.flight_number}</b> | ${f.departure} → ${f.arrival}<br><small>Статус: ${f.status}</small></span>
                    <span>${actionBtn} <button class="btn-delete" onclick="deleteFlight(${f.id})">🗑️</button></span>
                </div>`;
            }).join('');
        }

        window.changeStatus = async function(id, status) {
            await supabase.from('flights').update({ status }).eq('id', id);
            loadFlights();
        };

        window.deleteFlight = async function(id) {
            if (confirm('Удалить рейс?')) {
                await supabase.from('flights').delete().eq('id', id);
                loadFlights();
            }
        };

        async function loadChat() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            const box = document.getElementById('chatBox');
            box.innerHTML = (data || []).map(m => `<div class="msg"><b>${m.sender}:</b> ${m.text} <span class="time">${new Date(m.created_at).toLocaleTimeString()}</span></div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            await supabase.from('messages').insert({ text, sender: 'Диспетчер' });
            input.value = '';
        };
    </script>
</body>
</html>
