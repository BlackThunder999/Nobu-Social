<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Sibiria Airlines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border-radius: 10px; background: #0d1117; border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 1em; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 700; font-size: 1em; cursor: pointer; color: #fff; margin-bottom: 8px; }
        .btn-login { background: #0066cc; }
        .btn-crash { background: #b53030; }
        .btn-land { background: #0d8a3e; }
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .stats { margin: 20px 0; font-size: 1.1em; line-height: 2; }
        .err { color: #ff6b6b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card" id="loginBox">
        <h2>⚙️ Админ-панель</h2>
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn-login" onclick="login()">Войти</button>
        <p id="errMsg" class="err"></p>
        <button class="btn-back" onclick="location.href='index.html'">← На главную</button>
    </div>
    <div class="card" id="adminBox" style="display:none;">
        <h2>⚙️ Управление</h2>
        <div class="stats">
            <div>💥 Катастроф: <b id="cr">4</b></div>
            <div>✅ Посадок: <b id="ln">3</b></div>
        </div>
        <button class="btn-crash" onclick="add('cr')">💥 +1 Катастрофа (кот)</button>
        <button class="btn-land" onclick="add('ln')">✅ +1 Посадка</button>
        <button class="btn-back" onclick="location.href='index.html'">← На главную</button>
        <p style="margin-top:15px;color:#aaa;font-size:0.85em;">⚠️ Демо-режим: счётчики локальные</p>
    </div>
    <script>
        function login() {
            if (document.getElementById('pass').value === 'Sibiria2026') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminBox').style.display = 'block';
            } else {
                document.getElementById('errMsg').textContent = '❌ Неверный пароль!';
            }
        }
        function add(id) {
            const el = document.getElementById(id);
            el.textContent = parseInt(el.textContent) + 1;
        }
    </script>
</body>
</html>
