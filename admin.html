<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Sibiria Airlines</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0b0f18;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #131a2b;
            border: 1px solid #1e2d45;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin: 0 0 20px 0;
        }
        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: #0d1117;
            border: 1px solid #1e2d45;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            color: #fff;
            margin-bottom: 10px;
        }
        .btn-login { background: #0066cc; }
        .btn-crash { background: #b53030; }
        .btn-landing { background: #0d8a3e; }
        .btn-back { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); }
        .stat-display {
            margin: 20px 0;
            font-size: 18px;
            line-height: 1.8;
        }
        .error-text {
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card" id="loginCard">
        <h2>⚙️ Админ-панель</h2>
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button class="btn-login" onclick="login()">Войти</button>
        <p id="loginError" class="error-text"></p>
        <button class="btn-back" onclick="location.href='index.html'">← На главную</button>
    </div>

    <div class="card" id="adminCard" style="display:none;">
        <h2>⚙️ Управление статистикой</h2>
        <div class="stat-display">
            <div>💥 Катастрофы: <b id="crashValue">0</b></div>
            <div>✅ Удачные посадки: <b id="landingValue">0</b></div>
        </div>
        <button class="btn-crash" onclick="increment('crashes')">💥 +1 Катастрофа</button>
        <button class="btn-landing" onclick="increment('successful_landings')">✅ +1 Удачная посадка</button>
        <button class="btn-back" onclick="location.href='index.html'">← На главную</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );

        window.login = function() {
            if (document.getElementById('passwordInput').value === 'Sibiria2026') {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('adminCard').style.display = 'block';
                loadStats();
            } else {
                document.getElementById('loginError').textContent = 'Неверный пароль!';
            }
        };

        async function loadStats() {
            const { data } = await supabase.from('stats').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('crashValue').textContent = data.crashes;
                document.getElementById('landingValue').textContent = data.successful_landings;
            }
        }

        window.increment = async function(field) {
            const { data } = await supabase.from('stats').select(field).eq('id', 1).single();
            const newValue = (data?.[field] || 0) + 1;
            await supabase.from('stats').update({ [field]: newValue }).eq('id', 1);
            loadStats();
        };
    </script>
</body>
</html>
